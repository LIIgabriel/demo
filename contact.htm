    <title>Contact me</title>
</head>
<body>
    <h1>My contact me</h1>
    
    <form action="mailto:correo@gmail.com" method="POST" enctype="text/plain">

        <input type="text" name="name" id="" required><br>
        <label for="">Your email:</label>

        <label for="">Your message:</label><br>   
        <textarea name="mensaje" id="" cols="30" rows="10" required></textarea><br>
        <input type="submit">
    </form>
</body>
